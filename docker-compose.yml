version: "3.9"

services:
  # ── Bob API + Frontend ────────────────────────────────────
  bob:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      CHROMA_USE_HTTP: "true"
    depends_on:
      db:
        condition: service_healthy
      chroma:
        condition: service_started
    restart: unless-stopped

  # ── MariaDB ───────────────────────────────────────────────
  db:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-changeme}
      MYSQL_DATABASE: bob
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── ChromaDB vector store ─────────────────────────────────
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

volumes:
  db_data:
  chroma_data:
